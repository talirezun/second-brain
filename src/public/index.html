<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Second Brain</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Second Brain</h1>
      <nav>
        <button class="tab-btn active" data-tab="ingest">Ingest</button>
        <button class="tab-btn" data-tab="chat">Chat</button>
        <button class="tab-btn" data-tab="wiki">Wiki</button>
      </nav>
      <button id="stop-btn" class="btn stop" title="Stop the server">&#9632; Stop</button>
    </header>

    <!-- INGEST TAB -->
    <section id="tab-ingest" class="tab active">
      <h2>Ingest a Source</h2>
      <p class="hint">Upload a <code>.txt</code>, <code>.md</code>, or <code>.pdf</code> file. Claude will read it and update the wiki automatically.</p>
      <div class="form-group">
        <label for="ingest-domain">Domain</label>
        <select id="ingest-domain"></select>
      </div>
      <div class="form-group">
        <label for="ingest-file">File</label>
        <div class="drop-zone" id="drop-zone">
          <span id="drop-label">Drop file here or <label for="ingest-file" class="link">browse</label></span>
          <input type="file" id="ingest-file" accept=".txt,.md,.pdf" hidden />
        </div>
        <span id="file-name" class="file-name"></span>
      </div>
      <button id="ingest-btn" class="btn primary" disabled>Ingest</button>
      <div id="ingest-status" class="status hidden"></div>
      <div id="ingest-result" class="result hidden"></div>
    </section>

    <!-- CHAT TAB -->
    <section id="tab-chat" class="tab hidden">
      <div class="chat-layout">
        <!-- Sidebar -->
        <aside class="chat-sidebar">
          <div class="chat-sidebar-top">
            <select id="chat-domain" class="chat-domain-select"></select>
            <button id="new-chat-btn" class="btn primary new-chat-btn">+ New Chat</button>
          </div>
          <div id="conversation-list" class="conversation-list"></div>
        </aside>

        <!-- Main chat area -->
        <div class="chat-main">
          <div id="chat-empty" class="chat-empty">
            <div class="chat-empty-icon">🧠</div>
            <div class="chat-empty-title">Ask your Second Brain</div>
            <div class="chat-empty-sub">Select a domain, start a new chat, or pick a conversation.</div>
          </div>

          <div id="chat-thread" class="chat-thread hidden"></div>

          <div class="chat-input-bar">
            <textarea
              id="chat-input"
              class="chat-input"
              rows="1"
              placeholder="Ask anything… (⌘↵ to send)"
            ></textarea>
            <button id="chat-send-btn" class="btn primary chat-send-btn">Send</button>
          </div>
        </div>
      </div>
    </section>

    <!-- WIKI TAB -->
    <section id="tab-wiki" class="tab hidden">
      <h2>Browse Wiki</h2>
      <div class="form-group inline">
        <label for="wiki-domain">Domain</label>
        <select id="wiki-domain"></select>
        <button id="wiki-load-btn" class="btn">Load</button>
      </div>
      <div id="wiki-browser" class="wiki-browser hidden">
        <aside id="wiki-sidebar"></aside>
        <article id="wiki-content"></article>
      </div>
      <div id="wiki-empty" class="hint hidden">No pages found. Ingest some sources first.</div>
    </section>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
